<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0c994"/>
      <stop offset="50%" stop-color="#c8a96e"/>
      <stop offset="100%" stop-color="#a8894e"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8a96e"/>
      <stop offset="100%" stop-color="#e0c994"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- MARK: Geometric helix / DNA-inspired N with orbit rings -->
  <!-- Outer orbit ellipse -->
  <ellipse cx="30" cy="30" rx="22" ry="10" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.4" transform="rotate(-30 30 30)"/>
  <!-- Second orbit ellipse rotated -->
  <ellipse cx="30" cy="30" rx="22" ry="10" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.4" transform="rotate(30 30 30)"/>

  <!-- Central nucleus dot -->
  <circle cx="30" cy="30" r="3.5" fill="url(#goldGrad)" filter="url(#glow)"/>

  <!-- N letterform built from geometric lines -->
  <!-- Left vertical -->
  <line x1="19" y1="18" x2="19" y2="42" stroke="url(#goldGrad)" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Diagonal stroke -->
  <line x1="19" y1="18" x2="41" y2="42" stroke="url(#goldGrad2)" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Right vertical -->
  <line x1="41" y1="18" x2="41" y2="42" stroke="url(#goldGrad)" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Small orbital nodes (electrons) -->
  <circle cx="30" cy="8.5" r="2" fill="#c8a96e" opacity="0.9" filter="url(#glow)"/>
  <circle cx="52" cy="24" r="1.5" fill="#e0c994" opacity="0.7"/>
  <circle cx="8" cy="38" r="1.5" fill="#e0c994" opacity="0.7"/>

  <!-- WORDMARK -->
  <!-- "NERIA" -->
  <text x="66" y="27" font-family="'Cormorant Garamond', Georgia, serif" font-size="18" font-weight="600" letter-spacing="3" fill="url(#goldGrad)">NERIA</text>
  <!-- "SOLUTIONS" -->
  <text x="67" y="42" font-family="'DM Sans', Helvetica, sans-serif" font-size="8.5" font-weight="300" letter-spacing="5.5" fill="#8a8a9a">SOLUTIONS</text>

  <!-- Thin rule between name and tagline -->
  <line x1="66" y1="31" x2="196" y2="31" stroke="url(#goldGrad)" stroke-width="0.4" opacity="0.5"/>
</svg>
